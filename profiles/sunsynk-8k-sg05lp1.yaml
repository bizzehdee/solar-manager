# ─────────────────────────────────────────────────────────────────────────────
# Sunsynk SYNK-8K-SG05LP1 — 8 kW single-phase hybrid inverter.
# Thin extension of deye-base (Sunsynk = Sol-Ark = Deye firmware). See plan.md §4.
#
# Built from a validated regscan of THIS unit (label "10pm", 2026-06-17). Every
# inherited metric was cross-checked against physics from that scan:
#   battery P = V×I (749 W = 52.85 V × 14.18 A) ✓, inverter current ✓,
#   rated power 8000 W ✓, frequencies/voltages ✓, temps (offset) ✓.
#
# ⚠ STILL TO CONFIRM (single night capture): the SIGN conventions of
#   battery_power_w and grid_power_w. Capture a daytime PV-producing /
#   battery-charging / grid-exporting scan, then resolve `sign_unconfirmed`
#   in deye-base. PV1 voltage read 112 V at night (residual) — re-check by day.
# ─────────────────────────────────────────────────────────────────────────────
profile: sunsynk-8k-sg05lp1
extends: deye-base
vendor: sunsynk
model: SYNK-8K-SG05LP1

ratings:
  ac_power_w: 8000        # from rated_power [16,17] = 8000
  mppt_count: 2
  phases: 1
  battery: lithium        # LiFePO4 via CAN BMS, SoC mode (plan.md Decision #3)

# Pin to the firmware the map was derived from; warn on mismatch at connect
# (firmware updates can shift addresses — re-run regscan to re-validate).
firmware:
  protocol: "2.1"
  mcu: "5386"
  comm: "e43d"

# No metric/setting overrides yet — the base map matched this unit as-is.
overrides: {}

validation:
  source_scan: "tools/regscan-output (label '10pm', 2026-06-17)"
  confirmed:
    - battery_soc_pct, battery_voltage_v, battery_current_a (P=V×I)
    - battery_temp_c, inverter_temp_c, dc_transformer_temp_c (×0.1 − 100 offset)
    - grid_frequency_hz, grid_voltage_v, inverter_voltage_v, inverter_current_a
    - load_power_w, inverter_power_w, daily + lifetime energy counters
    - work-mode timer slots (250-279), timer_enabled (248), grid_charge (232)
    - rated_power 8000 W and 32-bit low-word-first order
  unconfirmed:
    - battery_power_w sign (night sample showed discharge = +)
    - grid_power_w sign (import vs export polarity)
    - pv1_voltage_v at night read 112 V (residual?) — recheck in daylight
