# ─────────────────────────────────────────────────────────────────────────────
# deye-base — shared base profile for the Deye-built single-phase hybrid family
# (Sunsynk = Sol-Ark = Deye, "1PH" firmware). See plan.md §4.
#
# Brands extend this (profiles/<brand>-<model>.yaml) and override only ratings /
# the odd address. Derived from the kellerza/sunsynk 1PH map and VALIDATED against
# a real SYNK-8K-SG05LP1 scan (tools/regscan-output, label "10pm", 2026-06-17).
#
# Conventions:
#   - All registers are HOLDING registers.
#   - 32-bit values are LOW WORD FIRST  (confirmed: rated_power [16,17]=8000 W,
#     energy counters). i.e. value = regs[addr] | (regs[addr+1] << 16).
#   - Temperatures use the Sunsynk (°C + 100) × 10 convention -> decode = raw/10 - 100
#     (validated: battery 22.0 °C, radiator 33.3 °C, DC-xfmr 39.4 °C).
#   - type: u16 | s16 | u32 | s32 | ascii | bits
#   - scale multiplies the raw; offset is added after scaling.
#
# SIGN CONVENTIONS (RESOLVED — grid-charging capture, 2026-06-17/18):
#   This unit reports battery DISCHARGE as POSITIVE / CHARGE as NEGATIVE — the
#   opposite of the canonical "+charge/-discharge". The grid-charging scan proved it:
#   while grid-charging the battery, [190] read -3968 W and [191] read s16 -7343
#   (-73.43 A × 54.04 V = -3968 W ✓). So battery_power_w / battery_current_a are
#   NEGATED here (scale -1 / -0.01) to normalize to "+charge/-discharge" before storage.
#   GRID: import is already POSITIVE on this unit ([169] = +4794 W while importing to
#   charge), which MATCHES the canonical "+import/-export" — so grid_power_w needs no
#   flip. (Export polarity = the s16 negative complement; a daytime exporting scan would
#   confirm it directly, but import is proven and that's the polarity the canon needs.)
# ─────────────────────────────────────────────────────────────────────────────
profile: deye-base
vendor: deye
phases: 1
register_table: holding
word_order: low_first

# raw registers -> normalized canonical metrics (plan.md §4).
metrics:
  # ── battery (reported via the inverter's BMS link) ──
  battery_soc_pct:          { addr: 184, type: u16 }  # Sunsynk API labels this "BatteryEnergy(Ah)" but value is % (tracks bms_soc_pct [316] and DeyeBat [10005]; 44% ≠ 44 Ah on a 312 Ah bank)
  battery_voltage_v:        { addr: 183, type: u16, scale: 0.01 }
  battery_current_a:        { addr: 191, type: s16, scale: -0.01 }  # +charge/-discharge (raw is s16 +discharge; negated to normalize)
  battery_power_w:          { addr: 190, type: s16, scale: -1 }      # +charge/-discharge (raw is s16 +discharge; negated to normalize)
  battery_temp_c:           { addr: 182, type: u16, scale: 0.1, offset: -100 }

  # ── PV (2 MPPTs on this hardware) ──
  pv1_power_w:              { addr: 186, type: s16 }
  pv1_voltage_v:            { addr: 109, type: u16, scale: 0.1 }
  pv1_current_a:            { addr: 110, type: u16, scale: 0.1 }
  pv2_power_w:              { addr: 187, type: s16 }
  pv2_voltage_v:            { addr: 111, type: u16, scale: 0.1 }
  pv2_current_a:            { addr: 112, type: u16, scale: 0.1 }

  # ── grid ──
  grid_power_w:             { addr: 169, type: s16 }                # +import/-export (raw already +import; confirmed +4794 W while importing)
  grid_voltage_v:           { addr: 150, type: u16, scale: 0.1 }
  grid_frequency_hz:        { addr: 79,  type: u16, scale: 0.01 }
  grid_ct_power_w:          { addr: 172, type: s16 }              # external CT (meter) power

  # ── load / inverter output ──
  load_power_w:             { addr: 178, type: s16 }
  inverter_power_w:         { addr: 175, type: s16 }                # load-test confirmed 423 W (2026-06-20)
  inverter_voltage_v:       { addr: 154, type: u16, scale: 0.1 }    # load-test confirmed 249.8 V (2026-06-20)
  inverter_current_a:       { addr: 164, type: u16, scale: 0.01 }   # load-test confirmed 1.80 A (≈1.7-2.0 A screen, 2026-06-20)
  inverter_frequency_hz:    { addr: 193, type: u16, scale: 0.01 }
  inverter_temp_c:          { addr: 91,  type: u16, scale: 0.1, offset: -100 }   # radiator/heatsink
  dc_transformer_temp_c:    { addr: 90,  type: u16, scale: 0.1, offset: -100 }
  # "overall state" enum at [59] (validated value 2 = normal/on-grid on this unit).
  # Seed mapping — verify the other states against the screen.
  inverter_status:          { addr: 59,  type: enum, values: { 0: standby, 1: selftest, 2: normal, 3: alarm, 4: fault } }
  grid_connected:           { addr: 194, type: u16 }              # 1 = on-grid
  # Canonical run-state derived from the grid-connection register (plan.md §4/§16).
  run_state:                { addr: 194, type: enum, values: { 0: off_grid, 1: on_grid } }
  alternator_status:        { addr: 195, type: u16 }              # gen/alternator; observed 16 when not connected

  # ── faults / alarms (plan.md §16) ──
  # 4×16-bit fault bitfield -> Sunsynk F01..F64 codes (active bits, low word first).
  # The F-number convention is standard; the per-bit meaning is verified against the screen.
  inverter_fault_codes:     { addr: [103, 104, 105, 106], type: bits, bit_prefix: "F" }
  # 2×16-bit warning bitfield at 101-102; mirrors fault layout but for advisory warnings.
  # Bit-to-message mapping is firmware-dependent; all active bits are surfaced as W01..W32.
  inverter_warning_codes:   { addr: [101, 102], type: bits, bit_prefix: "W" }

  # ── BMS link (registers 312–319, from manufacturer table) ──
  # 314 is confirmed accessible on SYNK-8K-SG05LP1 (CAN BMS). Observed to taper
  # 211→195 raw (21.1→19.5A, ×0.1) over ~1 hr of charging as the pack fills —
  # classic BMS CC→CV taper (scan 2026-06-18). 312 is definitively unresponsive
  # on this unit (single-register read failed; addressed twice). Others are untested.
  bms_charge_voltage_v:      { addr: 312, type: u16, scale: 0.01 }   # confirmed 58.40 V (16s LiFePO4 full charge, 2026-06-20)
  bms_charge_current_limit_a: { addr: 314, type: u16 }               # confirmed scale 1 (raw 33=33A at 95% SoC, ~39A at lower SoC — matches screen, 2026-06-20)
  bms_discharge_current_limit_a: { addr: 315, type: u16 }              # confirmed 300 A (scale 1, not 0.1 — 3× 100 A batteries in parallel, 2026-06-20)
  bms_soc_pct:               { addr: 316, type: u16 }                 # BMS reported SOC (confirmed 100%, 2026-06-20)
  bms_battery_voltage_v:     { addr: 317, type: u16, scale: 0.01 }   # BMS reported pack voltage (confirmed 54.60 V, 2026-06-20)
  bms_battery_current_a:     { addr: 318, type: s16, scale: 0.1 }    # BMS reported current (sign TBC — read 0 A while idle)
  bms_battery_temp_c:        { addr: 319, type: u16, scale: 0.1, offset: -100 }  # BMS temp (confirmed 25.0°C, 2026-06-20)

  # ── Deye BMS CAN link — aggregate (registers 10000–10022) ──
  # The inverter's CAN-bus view of the whole battery bank, reported by the BMS.
  # Scale assumptions are inferred from decoded API values — ALL marked TBC until
  # verified against a raw scan. Use:
  #   regscan.py dump --profile profiles/deye-base.yaml --port /dev/ttyUSB0 \
  #     --section bms_can --interval 10 --out bms-raw.csv
  bms_pack_count:             { addr: 10002, type: u16 }                        # number of installed packs (observed 3)
  bms_can_voltage_v:          { addr: 10003, type: u16, scale: 0.1 }            # TBC: 531 raw -> 53.1 V?
  bms_can_current_a:          { addr: 10004, type: s16 }                        # TBC: -19 raw -> -19 A (int amps)?
  bms_can_soc_pct:            { addr: 10005, type: u16 }                        # observed 44; scale 1 assumed
  bms_can_soh_pct:            { addr: 10006, type: u16 }                        # observed 100; scale 1 assumed
  bms_can_temp_c:             { addr: 10008, type: s16, scale: 0.1 }            # TBC: 270 raw -> 27.0°C? (direct, no +100 offset)
  bms_can_charge_voltage_v:   { addr: 10009, type: u16, scale: 0.1 }            # TBC: 584 raw -> 58.4 V?
  bms_can_charge_limit_a:     { addr: 10013, type: u16 }                        # TBC: 300 raw -> 300 A?
  bms_can_discharge_limit_a:  { addr: 10014, type: u16 }
  bms_can_fault1:             { addr: 10019, type: u16 }
  bms_can_fault2:             { addr: 10020, type: u16 }
  bms_can_alarm1:             { addr: 10021, type: u16 }
  bms_can_alarm2:             { addr: 10022, type: u16 }

  # ── Deye BMS CAN link — per-pack (stride 38; up to 22 packs) ──
  # base_addr = 10032 + (pack_number - 1) × 38
  # Offsets within each block:  +8 voltage  +9 current  +10 temp_avg
  #   +15 soc  +16 soh  +22 max_cell  +23 min_cell  +24 cycle_count
  # Scale assumptions (TBC vs raw scan — use `regscan.py dump --profile ...`):
  #   voltage    u16 × 0.1   (531  → 53.1 V)
  #   current    s16 × 0.1   (-66  → -6.6 A)   sign TBC
  #   temp       s16 × 0.1   (275  → 27.5 °C)  direct °C, NOT the +100 offset
  #   soc/soh    u16 × 0.1   (436  → 43.6 %)
  #   cell_v     u16 × 0.001 (3327 → 3.327 V)
  #   cycles     u16         (21   → 21)
  # Inactive packs (> bms_pack_count) return 0 / -100°C; poller skips them.

  # Pack 1  (serial 10032–10039)
