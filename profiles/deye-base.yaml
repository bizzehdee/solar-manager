# ─────────────────────────────────────────────────────────────────────────────
# deye-base — shared base profile for the Deye-built single-phase hybrid family
# (Sunsynk = Sol-Ark = Deye, "1PH" firmware). See plan.md §4.
#
# Brands extend this (profiles/<brand>-<model>.yaml) and override only ratings /
# the odd address. Derived from the kellerza/sunsynk 1PH map and VALIDATED against
# a real SYNK-8K-SG05LP1 scan (tools/regscan-output, label "10pm", 2026-06-17).
#
# Conventions:
#   - All registers are HOLDING registers.
#   - 32-bit values are LOW WORD FIRST  (confirmed: rated_power [16,17]=8000 W,
#     energy counters). i.e. value = regs[addr] | (regs[addr+1] << 16).
#   - Temperatures use the Sunsynk (°C + 100) × 10 convention -> decode = raw/10 - 100
#     (validated: battery 22.0 °C, radiator 33.3 °C, DC-xfmr 39.4 °C).
#   - type: u16 | s16 | u32 | s32 | ascii | bits
#   - scale multiplies the raw; offset is added after scaling.
#
# SIGN CONVENTIONS (RESOLVED — grid-charging capture, 2026-06-17/18):
#   This unit reports battery DISCHARGE as POSITIVE / CHARGE as NEGATIVE — the
#   opposite of the canonical "+charge/-discharge". The grid-charging scan proved it:
#   while grid-charging the battery, [190] read -3968 W and [191] read s16 -7343
#   (-73.43 A × 54.04 V = -3968 W ✓). So battery_power_w / battery_current_a are
#   NEGATED here (scale -1 / -0.01) to normalize to "+charge/-discharge" before storage.
#   GRID: import is already POSITIVE on this unit ([169] = +4794 W while importing to
#   charge), which MATCHES the canonical "+import/-export" — so grid_power_w needs no
#   flip. (Export polarity = the s16 negative complement; a daytime exporting scan would
#   confirm it directly, but import is proven and that's the polarity the canon needs.)
# ─────────────────────────────────────────────────────────────────────────────
profile: deye-base
vendor: deye
phases: 1
register_table: holding
word_order: low_first

# raw registers -> normalized canonical metrics (plan.md §4).
metrics:
  # ── battery (reported via the inverter's BMS link) ──
  battery_soc_pct:          { addr: 184, type: u16 }
  battery_voltage_v:        { addr: 183, type: u16, scale: 0.01 }
  battery_current_a:        { addr: 191, type: s16, scale: -0.01 }  # +charge/-discharge (raw is s16 +discharge; negated to normalize)
  battery_power_w:          { addr: 190, type: s16, scale: -1 }      # +charge/-discharge (raw is s16 +discharge; negated to normalize)
  battery_temp_c:           { addr: 182, type: u16, scale: 0.1, offset: -100 }

  # ── PV (2 MPPTs on this hardware) ──
  pv1_power_w:              { addr: 186, type: s16 }
  pv1_voltage_v:            { addr: 109, type: u16, scale: 0.1 }
  pv1_current_a:            { addr: 110, type: u16, scale: 0.1 }
  pv2_power_w:              { addr: 187, type: s16 }
  pv2_voltage_v:            { addr: 111, type: u16, scale: 0.1 }
  pv2_current_a:            { addr: 112, type: u16, scale: 0.1 }

  # ── grid ──
  grid_power_w:             { addr: 169, type: s16 }                # +import/-export (raw already +import; confirmed +4794 W while importing)
  grid_voltage_v:           { addr: 150, type: u16, scale: 0.1 }
  grid_frequency_hz:        { addr: 79,  type: u16, scale: 0.01 }
  grid_ct_power_w:          { addr: 172, type: s16 }              # external CT (meter) power

  # ── load / inverter output ──
  load_power_w:             { addr: 178, type: s16 }
  inverter_power_w:         { addr: 175, type: s16 }
  inverter_voltage_v:       { addr: 154, type: u16, scale: 0.1 }
  inverter_current_a:       { addr: 164, type: u16, scale: 0.01 }
  inverter_frequency_hz:    { addr: 193, type: u16, scale: 0.01 }
  inverter_temp_c:          { addr: 91,  type: u16, scale: 0.1, offset: -100 }   # radiator/heatsink
  dc_transformer_temp_c:    { addr: 90,  type: u16, scale: 0.1, offset: -100 }
  # "overall state" enum at [59] (validated value 2 = normal/on-grid on this unit).
  # Seed mapping — verify the other states against the screen.
  inverter_status:          { addr: 59,  type: enum, values: { 0: standby, 1: selftest, 2: normal, 3: alarm, 4: fault } }
  grid_connected:           { addr: 194, type: u16 }              # 1 = on-grid
  # Canonical run-state derived from the grid-connection register (plan.md §4/§16).
  run_state:                { addr: 194, type: enum, values: { 0: off_grid, 1: on_grid } }

  # ── faults / alarms (plan.md §16) ──
  # 4×16-bit fault bitfield -> Sunsynk F01..F64 codes (active bits, low word first).
  # The F-number convention is standard; the per-bit meaning is verified against the screen.
  inverter_fault_codes:     { addr: [103, 104, 105, 106], type: bits, bit_prefix: "F" }

  # ── daily energy counters (raw is kWh ×0.1; ×100 -> Wh per canonical keys) ──
  today_pv_wh:              { addr: 108, type: u16, scale: 100 }
  today_load_wh:            { addr: 84,  type: u16, scale: 100 }
  today_grid_import_wh:     { addr: 76,  type: u16, scale: 100 }
  today_grid_export_wh:     { addr: 77,  type: u16, scale: 100 }
  today_batt_charge_wh:     { addr: 70,  type: u16, scale: 100 }
  today_batt_discharge_wh:  { addr: 71,  type: u16, scale: 100 }

  # ── lifetime energy totals (32-bit, low word first; kWh ×0.1 -> Wh) ──
  total_pv_wh:              { addr: [96, 97], type: u32, scale: 100 }
  total_load_wh:            { addr: [85, 86], type: u32, scale: 100 }
  total_grid_import_wh:     { addr: [78, 80], type: u32, scale: 100 }   # note: NON-adjacent (79 is grid freq)
  total_grid_export_wh:     { addr: [81, 82], type: u32, scale: 100 }
  total_batt_charge_wh:     { addr: [72, 73], type: u32, scale: 100 }
  total_batt_discharge_wh:  { addr: [74, 75], type: u32, scale: 100 }

# Writable control settings -> SettingsSchema (plan.md §4/§12). The work-mode
# timer is 6 repeating slots; slot i uses base_addr + i.
# All addresses below are VALIDATED against the SG05LP1's own screen (2026-06-18 config
# read-out + the grid-charging regscan dump). See validation block in the child profile.
settings:
  # Sections mirror the inverter's own setting menus (the Control page lays them out 2-up).
  # POLICY (user 2026-06-18): EVERY setting is shown, but anything whose register isn't
  # screen-confirmed is READ-ONLY (`writable: false`) — it is read/displayed but never
  # written and excluded from the write allow-list (§12). A read-only field with a candidate
  # `addr` (seeded from the kellerza/sunsynk map, marked "candidate") shows a live value to
  # verify against the inverter screen; one with no `addr` is a visible placeholder ("—")
  # until its register is pinned. Promote a field to read/write only once confirmed.

  # Grid protection menu. grid_type / grid_frequency are read-only on the device itself; the
  # limits are settable there but unconfirmed here, so read-only for now.
  grid:
    grid_type:               { type: enum, writable: false, values: { 0: single_phase, 1: split_phase, 2: three_phase, 3: single_phase_120v } }   # addr TBD
    grid_voltage_high_v:     { type: u16, scale: 0.1, writable: false }   # addr TBD
    grid_voltage_low_v:      { type: u16, scale: 0.1, writable: false }   # addr TBD
    grid_frequency:          { type: enum, writable: false, values: { 0: hz_50, 1: hz_60 } }   # addr TBD
    grid_frequency_high_hz:  { type: u16, scale: 0.01, writable: false }  # addr TBD
    grid_frequency_low_hz:   { type: u16, scale: 0.01, writable: false }  # addr TBD
    grid_peak_shaving:       { addr: 280, type: bool, mask: 0x100, writable: false }    # candidate (kellerza bit8)
    grid_peak_shaving_power_w: { addr: 293, type: u16, writable: false }  # candidate (kellerza)

  # Battery type / protocol. lithium_protocol + capacity confirmed; type & operation pending.
  battery_type:
    battery_type:            { type: enum, writable: false, values: { 0: lithium, 1: agm } }   # addr TBD
    lithium_protocol:        { addr: 325, type: enum, values: { 0: can } }   # screen "Lithium protocol"; CAN
    battery_operation:       { type: enum, writable: false, values: { 0: voltage, 1: state_of_charge, 2: none } }   # addr TBD
    battery_capacity_ah:     { addr: 204, type: u16 }                # confirmed 312 Ah (≈16 kWh @ 51.2 V)

  # Battery charging limits (all confirmed → writable; voltages ×0.01 V).
  battery_charging:
    max_charge_current_a:    { addr: 210, type: u16 }                # confirmed 140 A
    max_discharge_current_a: { addr: 211, type: u16 }                # confirmed 180 A
    grid_charge_current_a:   { addr: 230, type: u16 }                # confirmed 80 A
    gen_charge_current_a:    { addr: 227, type: u16 }                # confirmed 40 A
    float_voltage_v:         { addr: 203, type: u16, scale: 0.01 }   # confirmed 53.6 V
    absorption_voltage_v:    { addr: 202, type: u16, scale: 0.01 }   # confirmed 56.0 V
    equalization_voltage_v:  { addr: 201, type: u16, scale: 0.01 }   # confirmed 56.0 V
    shutdown_voltage_v:      { addr: 220, type: u16, scale: 0.01 }
    restart_voltage_v:       { addr: 221, type: u16, scale: 0.01 }
    low_voltage_v:           { addr: 222, type: u16, scale: 0.01 }

  # Work-mode toggles + SoC thresholds. remote switch / generator charge / force-gen pending.
  work_mode:
    timer_enabled:           { addr: 248, type: bool, mask: 0x01 }   # "Use Timer"
    grid_charge:             { addr: 232, type: bool, mask: 0x01 }   # confirmed Enabled = 1
    remote_switch:           { type: bool, writable: false }         # addr TBD
    generator_charge:        { type: bool, writable: false }         # addr TBD
    force_generator_on:      { type: bool, writable: false }         # addr TBD
    shutdown_soc_pct:        { addr: 217, type: u16 }                # "Output shutdown capacity" (confirmed 5 %)
    low_soc_pct:             { addr: 219, type: u16 }                # "Stop battery discharge capacity" (confirmed 10 %)
    restart_soc_pct:         { addr: 218, type: u16 }                # "Start battery discharge capacity" (confirmed 25 %)
    start_grid_charge_soc_pct: { addr: 229, type: u16 }              # "Start grid charge capacity" (confirmed 30 %)

  # Work-mode detail. grid trickle feed pending its address.
  work_mode_detail:
    # "Work mode" / energy-management model. Canonical Deye/Sunsynk order; [244]=2 =
    # "Zero export to CT" is screen-confirmed on this unit, 0/1 are the standard family values.
    work_mode:               { addr: 244, type: enum, values: { 0: selling_first, 1: zero_export_to_load, 2: zero_export_to_ct } }
    solar_export:            { addr: 247, type: bool, mask: 0x01 }   # "Solar export when battery full" — TOGGLE-CONFIRMED 0→1
    energy_pattern:          { addr: 243, type: enum, values: { 0: battery_first, 1: load_first } }  # confirmed 1 = Load first
    max_sell_power_w:        { addr: 245, type: u16 }                # confirmed 8000 W
    max_solar_power_w:       { addr: 53,  type: u16 }                # confirmed 4800 W
    grid_trickle_feed_w:     { type: u16, writable: false }          # addr TBD

  # Aux / Generator. kellerza candidates for aux port + peak-shaving; capacities/timers pending.
  aux_gen:
    auxiliary_port:          { addr: 235, type: enum, values: { 0: disable, 1: smartload, 2: generator }, writable: false }  # candidate (kellerza)
    generator_connected_to_grid: { type: bool, writable: false }     # addr TBD
    gen_peak_shaving:        { addr: 280, type: bool, mask: 0x10, writable: false }    # candidate (kellerza bit4)
    gen_peak_shaving_power_w: { addr: 292, type: u16, writable: false }  # candidate (kellerza)
    gen_start_soc_pct:       { type: u16, writable: false }          # addr TBD
    gen_stop_soc_pct:        { type: u16, writable: false }          # addr TBD
    gen_max_run_time_h:      { type: u16, writable: false }          # addr TBD
    gen_down_time_h:         { type: u16, writable: false }          # addr TBD

  # Work-mode timer: 6 repeating slots, slot i = base_addr + i. ALL fields confirmed against
  # the screen. There is NO end-time register — a slot ends when the next begins (cyclic,
  # wraps the last slot → the first). Example validated config (this unit, cheap-night plan):
  #   start  power  soc  grid gen     ── grid-charge to 65% overnight, 10% floor by day:
  #   00:05  8kW    65%  on   off       slot1 [250]=5  [256]=8000 [268]=65 [274]=5 (bit0 grid on)
  #   05:55  8kW    10%  off  off       slot2 [251]=555 ...                  [275]=4 (grid off)
  #   09:00 / 13:00 / 17:00 / 21:00 — all 8kW / 10% / grid off / gen off.
  timer_slots:
    count: 6
    fields:
      start_time:        { base_addr: 250, type: time_hhmm }    # 250..255  (raw 5 -> 00:05, 555 -> 05:55)
      power_w:           { base_addr: 256, type: u16 }          # 256..261
      target_soc_pct:    { base_addr: 268, type: u16 }          # 268..273
      voltage_v:         { base_addr: 262, type: u16, scale: 0.01 }  # 262..267 (unused in SoC mode)
      charge_from_grid:  { base_addr: 274, type: bool, mask: 0x01 }  # 274..279 bit0 (confirmed)
      charge_from_gen:   { base_addr: 274, type: bool, mask: 0x02 }  #          bit1
      mode:              { base_addr: 274, type: bits, mask: 0x1C }  #          bits 2-4

# Device identity.
info:
  serial:      { addr: [3, 4, 5, 6, 7], type: ascii }   # 5 regs, 2 ASCII chars each
  device_type: { addr: 0, type: u16 }
  protocol:    { addr: 2, type: version_be }   # 0x0201 -> "2.1" (high.low bytes)
  rated_power_w: { addr: [16, 17], type: u32, scale: 0.1 }   # validated: 8000 W
