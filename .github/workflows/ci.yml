name: CI

# Hard gates (plan.md §21): build, unit tests, coverage, Playwright E2E, and the
# no-CDN check all fail the build (red) on failure — none are warnings. Runs entirely
# on the working-copy path: no hardware, no Docker; the dummy device + fixtures are
# what CI exercises.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      # GATE: tests must pass AND overall coverage >= 80% (§21).
      - run: pytest --cov-fail-under=80

  frontend:
    name: Frontend (build + unit tests + no-CDN)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # GATE: production build must succeed (no build/type errors).
      - run: npm run build
      # GATE: unit tests (vitest, headless via jsdom).
      - run: CI=true npm test -- --watch=false
      # GATE: no CDN — the built app must reference zero external URLs (offline, §8/§13).
      - name: No-CDN check
        run: |
          # Allow-listed false positives — string literals baked into framework/build
          # output, never fetched at runtime: w3.org XML/SVG/MathML namespace URIs,
          # sass-lang source-map refs, localhost, and angular.dev (the doc pointer
          # Angular embeds in its DOM-sanitizer warning messages).
          if grep -rEoh "https?://[^ )\"']+" dist/solarvolt/browser/*.css dist/solarvolt/browser/*.js \
             | grep -viE "www\.w3\.org|sass-lang\.com|localhost|angular\.dev"; then
            echo "::error::External URL found in built frontend — assets must be self-hosted (no CDN)."
            exit 1
          fi
          echo "No external URLs — fully self-hosted."

  e2e:
    name: E2E (Playwright on the dummy)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install backend
        run: |
          python -m venv .venv
          .venv/bin/pip install -r backend/requirements.txt
      - name: Build frontend (served by the backend)
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      # GATE: any E2E failure fails CI (pass/fail, not coverage-measured).
      - name: Run E2E
        working-directory: e2e
        run: npm test
